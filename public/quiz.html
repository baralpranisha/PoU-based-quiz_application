<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizVerse PoU — Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f4f8;
      --surface: #ffffff;
      --panel: #ffffff;
      --card: #f9fafb;
      --line: #e5e7eb;
      --blue: #1a56db;
      --blue-dim: rgba(26,86,219,0.08);
      --text: #374151;
      --sub: #6b7280;
      --white: #111827;
      --green: #0f6e56;
      --gold: #b45309;
      --red: #dc2626;
    }
    body { font-family:'Outfit',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    nav {
      position:sticky; top:0; z-index:100;
      background:rgba(255,255,255,0.95); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
      padding:0 32px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .nav-left { display:flex; align-items:center; gap:12px; }
    .nav-logo { font-family:'Cormorant Garamond',Georgia,serif; font-size:17px; font-weight:700; color:#0d1b2e; }
    .nav-logo span { color:var(--blue); font-style:italic; }
    .nav-sep { width:1px; height:16px; background:var(--line); }
    .nav-subj { font-size:13px; color:var(--sub); }
    .nav-subj strong { color:var(--text); font-weight:500; }

    .timer-wrap { display:flex; align-items:center; gap:8px; }
    .timer-label { font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:0.5px; }
    .timer-val { font-family:'Cormorant Garamond',Georgia,serif; font-size:20px; font-weight:700; color:var(--gold); background:var(--panel); border:1px solid var(--line); padding:5px 14px; border-radius:8px; min-width:80px; text-align:center; transition:color 0.3s, border-color 0.3s; }
    .timer-val.warn { color:var(--gold); border-color:rgba(180,83,9,0.35); }
    .timer-val.crit { color:var(--red); border-color:rgba(220,38,38,0.35); animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .practice-badge { font-size:12px; color:var(--sub); background:var(--card); border:1px solid var(--line); padding:5px 14px; border-radius:8px; }

    .main { max-width:740px; margin:0 auto; padding:32px 20px 80px; }

    .progress-wrap { margin-bottom:24px; }
    .progress-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
    .progress-row .pl { font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:0.5px; }
    .progress-row .pr { font-size:13px; color:var(--blue); font-weight:500; }
    .progress-track { width:100%; height:4px; background:var(--line); border-radius:4px; overflow:hidden; }
    .progress-bar { height:100%; background:var(--blue); border-radius:4px; transition:width 0.4s ease; }

    .dot-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:24px; }
    .qdot { width:26px; height:26px; border-radius:6px; border:1px solid var(--line); background:var(--card); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--sub); cursor:pointer; transition:all 0.2s; }
    .qdot.cur      { border-color:var(--blue); background:var(--blue); color:white; }
    .qdot.answered { border-color:var(--green); color:var(--green); background:rgba(15,110,86,0.08); }
    .qdot.skipped  { border-color:var(--gold);  color:var(--gold);  background:rgba(180,83,9,0.08); }

    .q-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:30px; margin-bottom:18px; animation:fadeUp 0.25s ease both; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .q-num { font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px; }
    .q-text { font-family:'Cormorant Garamond',Georgia,serif; font-size:20px; font-weight:700; line-height:1.45; color:var(--white); margin-bottom:26px; }

    .opts { display:flex; flex-direction:column; gap:10px; }
    .opt { width:100%; padding:14px 18px; background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--text); font-family:'Outfit',system-ui,sans-serif; font-size:14px; cursor:pointer; transition:all 0.18s; text-align:left; display:flex; align-items:center; gap:14px; }
    .opt:hover:not(:disabled) { border-color:var(--blue); background:var(--blue-dim); }
    .opt-lbl { width:26px; height:26px; border-radius:6px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--sub); flex-shrink:0; transition:all 0.18s; }
    .opt:hover:not(:disabled) .opt-lbl { border-color:var(--blue); color:var(--blue); }
    .opt.chosen { border-color:var(--blue); background:var(--blue-dim); }
    .opt.chosen .opt-lbl { background:var(--blue); border-color:var(--blue); color:white; }
    .opt.right  { border-color:var(--green) !important; background:rgba(15,110,86,0.07) !important; }
    .opt.right .opt-lbl { background:var(--green) !important; border-color:var(--green) !important; color:white !important; }
    .opt.wrong  { border-color:var(--red) !important; background:rgba(220,38,38,0.06) !important; }
    .opt.wrong .opt-lbl { background:var(--red) !important; border-color:var(--red) !important; color:white !important; }

    .feedback { margin-top:14px; padding:11px 15px; border-radius:8px; font-size:13px; line-height:1.5; display:none; }
    .feedback.right { background:rgba(15,110,86,0.07); border:1px solid rgba(15,110,86,0.2); color:#0f6e56; display:block; }
    .feedback.wrong { background:rgba(220,38,38,0.06); border:1px solid rgba(220,38,38,0.2); color:var(--red); display:block; }

    .controls { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .ctrl-group { display:flex; gap:8px; }
    .btn { padding:10px 20px; border-radius:8px; font-family:'Outfit',system-ui,sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.18s; }
    .btn-ghost  { background:none; border:1px solid var(--line); color:var(--sub); }
    .btn-ghost:hover  { border-color:var(--blue); color:var(--blue); }
    .btn-ghost:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-blue   { background:var(--blue); border:none; color:white; }
    .btn-blue:hover   { opacity:0.85; transform:translateY(-1px); }
    .btn-skip   { background:none; border:1px solid rgba(180,83,9,0.3); color:var(--gold); }
    .btn-skip:hover   { background:rgba(180,83,9,0.07); }
    .btn-danger { background:none; border:1px solid rgba(220,38,38,0.3); color:var(--red); }
    .btn-danger:hover { background:rgba(220,38,38,0.06); }

    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; }
    .overlay.show { display:flex; }
    .modal { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:32px; max-width:380px; width:90%; text-align:center; animation:popIn 0.25s ease both; box-shadow:0 8px 32px rgba(0,0,0,0.12); }
    @keyframes popIn { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
    .modal h3 { font-family:'Cormorant Garamond',Georgia,serif; font-size:22px; font-weight:700; color:var(--white); margin-bottom:8px; }
    .modal p { font-size:13px; color:var(--sub); margin-bottom:22px; line-height:1.6; }
    .modal-stats { display:flex; gap:10px; justify-content:center; margin-bottom:22px; }
    .mstat { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px 14px; flex:1; }
    .mstat .mv { font-family:'Cormorant Garamond',Georgia,serif; font-size:20px; font-weight:700; }
    .mstat .mk { font-size:11px; color:var(--sub); margin-top:2px; }
    .modal-btns { display:flex; gap:8px; }
    .modal-btns button { flex:1; padding:11px; border-radius:8px; font-family:'Outfit',system-ui,sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.18s; }
    .mbtn-cancel { background:none; border:1px solid var(--line); color:var(--sub); }
    .mbtn-cancel:hover { border-color:var(--blue); color:var(--blue); }
    .mbtn-submit { background:var(--blue); border:none; color:white; }

    .no-qs { text-align:center; padding:60px 20px; }
    .no-qs h3 { font-family:'Cormorant Garamond',Georgia,serif; font-size:22px; color:var(--white); margin-bottom:8px; }
    .no-qs p { font-size:14px; color:var(--sub); margin-bottom:24px; }
    .no-qs a { color:var(--blue); text-decoration:none; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo">QuizVerse <span>PoU</span></div>
    <div class="nav-sep"></div>
    <div class="nav-subj"><strong id="navSubj">Loading...</strong></div>
  </div>
  <div class="timer-wrap">
    <span class="timer-label" id="timerLabel">Time Remaining</span>
    <div class="timer-val" id="timerVal">25:00</div>
    <div class="practice-badge" id="pracBadge" style="display:none">Practice Mode</div>
  </div>
</nav>

<div class="main" id="mainWrap">
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="pl">Progress</span>
      <span class="pr" id="progText">1 / 25</span>
    </div>
    <div class="progress-track"><div class="progress-bar" id="progBar" style="width:4%"></div></div>
  </div>
  <div class="dot-row" id="dotRow"></div>
  <div class="q-card">
    <div class="q-num" id="qNum">Question 1 of 25</div>
    <div class="q-text" id="qText">Loading question...</div>
    <div class="opts" id="optsGrid"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="controls">
    <button class="btn btn-ghost" onclick="prevQ()" id="btnPrev" disabled>← Previous</button>
    <div class="ctrl-group">
      <button class="btn btn-skip"   onclick="skipQ()">Skip</button>
      <button class="btn btn-danger" onclick="openModal()">Submit Quiz</button>
    </div>
    <button class="btn btn-blue" onclick="nextQ()" id="btnNext">Next →</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Submit Quiz</h3>
    <p>Once submitted, you cannot change your answers. Review your progress below before confirming.</p>
    <div class="modal-stats">
      <div class="mstat"><div class="mv" id="mAns" style="color:var(--green)">0</div><div class="mk">Answered</div></div>
      <div class="mstat"><div class="mv" id="mSkip" style="color:var(--gold)">0</div><div class="mk">Skipped</div></div>
      <div class="mstat"><div class="mv" id="mLeft" style="color:var(--red)">25</div><div class="mk">Remaining</div></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn-cancel" onclick="closeModal()">Continue Quiz</button>
      <button class="mbtn-submit" onclick="submitQuiz()">Confirm Submit</button>
    </div>
  </div>
</div>

<script>

const subject = localStorage.getItem('quizSubject') || '';
const mode    = localStorage.getItem('quizMode')    || 'timed';
const sem     = parseInt(localStorage.getItem('quizSem') || '1');

document.getElementById('navSubj').textContent = subject || 'Unknown Subject';

if (mode === 'practice') {
  document.getElementById('timerVal').style.display   = 'none';
  document.getElementById('timerLabel').style.display = 'none';
  document.getElementById('pracBadge').style.display  = 'block';
}

const QB = {

  // ── SEMESTER 1 ──────────────────────────────────────────────
  'Calculus I': [
    {q:'What is the derivative of sin(x)?',opts:['cos(x)','-cos(x)','tan(x)','-sin(x)'],ans:0},
    {q:'What is the integral of 1/x dx?',opts:['x²','ln|x|','1/x²','e^x'],ans:1},
    {q:'What is the limit of (sin x)/x as x → 0?',opts:['0','∞','1','undefined'],ans:2},
    {q:'Which rule is used to differentiate a product of two functions?',opts:['Chain Rule','Quotient Rule','Product Rule','Power Rule'],ans:2},
    {q:'The derivative of e^x is?',opts:['xe^(x-1)','e^x','e^(x+1)','1'],ans:1},
    {q:'What is d/dx(ln x)?',opts:['1/x','ln x','x','e^x'],ans:0},
    {q:'∫cos(x)dx = ?',opts:['sin(x)+C','-sin(x)+C','cos(x)+C','-cos(x)+C'],ans:0},
    {q:'The second derivative of a function tells us about?',opts:['Slope','Concavity','Area','Volume'],ans:1},
    {q:'What is the derivative of x^n?',opts:['nx','nx^(n-1)','x^(n+1)/(n+1)','n/x'],ans:1},
    {q:'Rolle\'s theorem requires the function to be?',opts:['Discontinuous','Differentiable on (a,b)','Only continuous','Not defined'],ans:1},
    {q:'The chain rule formula is?',opts:['dy/dx = dy/du * du/dx','dy/dx = dy/du + du/dx','dy/dx = dy/du - du/dx','dy/dx = du/dy * dx/du'],ans:0},
    {q:'∫e^x dx = ?',opts:['xe^x + C','e^x + C','e^(x+1) + C','1/e^x + C'],ans:1},
    {q:'A critical point occurs when?',opts:["f'(x) = 1","f'(x) = 0 or undefined","f(x) = 0","f''(x) = 0"],ans:1},
    {q:'What does a definite integral represent geometrically?',opts:['Slope of tangent','Area under the curve','Volume','Perimeter'],ans:1},
    {q:'The Taylor series of e^x starts with?',opts:['1 - x + x²/2!','1 + x + x²/2!','x + x²/2! + x³/3!','1 + x² + x⁴'],ans:1},
    {q:'lim(x→∞) 1/x = ?',opts:['1','∞','0','-1'],ans:2},
    {q:'Which test uses f\'\'(x) to classify critical points?',opts:['First derivative test','Second derivative test','Limit test','Squeeze theorem'],ans:1},
    {q:'∫(from 0 to 1) x dx = ?',opts:['1','0.5','2','0.25'],ans:1},
    {q:'The derivative of tan(x) is?',opts:['sec²(x)','cot(x)','cos²(x)','sin²(x)'],ans:0},
    {q:'What is the antiderivative of 0?',opts:['0','x','C','1'],ans:2},
    {q:'L\'Hopital\'s rule applies when a limit gives which form?',opts:['0/1','1/0','0/0 or ∞/∞','0*∞ only'],ans:2},
    {q:'The MVT states that there exists c in (a,b) such that f\'(c) equals?',opts:['f(b)-f(a)','[f(b)-f(a)]/(b-a)','(b-a)/f(b)','f(a)+f(b)'],ans:1},
    {q:'d/dx[sin²(x)] = ?',opts:['2sin(x)','sin(2x)','2cos(x)','cos(2x)'],ans:1},
    {q:'A function is increasing when?',opts:["f'(x) < 0","f'(x) = 0","f'(x) > 0","f''(x) > 0"],ans:2},
    {q:'∫sec²(x) dx = ?',opts:['sec(x)tan(x)+C','tan(x)+C','-cot(x)+C','sec(x)+C'],ans:1},
  ],

  'Digital Logic': [
    {q:'How many values can a single bit represent?',opts:['1','2','4','8'],ans:1},
    {q:'Which gate outputs 1 only when all inputs are 1?',opts:['OR','AND','NOT','XOR'],ans:1},
    {q:'The complement of 1 in binary is?',opts:['1','0','2','undefined'],ans:1},
    {q:'Which Boolean expression represents De Morgan\'s theorem?',opts:["(A+B)' = A'.B'","(AB)' = A'+B'","Both A and B","None"],ans:2},
    {q:'A half adder can add how many bits?',opts:['1','2','3','4'],ans:1},
    {q:'What is the decimal equivalent of binary 1010?',opts:['8','9','10','11'],ans:2},
    {q:'A flip-flop stores how many bits?',opts:['4','8','1','2'],ans:2},
    {q:'Which logic family is most commonly used in modern ICs?',opts:['TTL','CMOS','ECL','RTL'],ans:1},
    {q:'A multiplexer selects one of how many inputs?',opts:['Only 2','Only 4','2^n based on select lines','Unlimited'],ans:2},
    {q:'XOR of a number with itself gives?',opts:['The number itself','All 1s','0','Undefined'],ans:2},
    {q:'A Karnaugh map is used to?',opts:['Add binary numbers','Minimize Boolean expressions','Convert decimal to binary','Design flip-flops'],ans:1},
    {q:'Which number system uses digits 0-7?',opts:['Binary','Decimal','Octal','Hexadecimal'],ans:2},
    {q:'Hexadecimal F equals decimal?',opts:['14','15','16','12'],ans:1},
    {q:'A full adder has how many inputs?',opts:['2','3','4','1'],ans:1},
    {q:'Which gate is called a universal gate?',opts:['AND','OR','NAND','XOR'],ans:2},
    {q:'The 2\'s complement of 0110 is?',opts:['1001','1010','0110','1100'],ans:1},
    {q:'A D flip-flop captures input on?',opts:['Any time','Reset','Clock edge','Power on'],ans:2},
    {q:'Sum of Products (SOP) is also called?',opts:['Minterm form','Maxterm form','Canonical form','DNF form'],ans:0},
    {q:'A decoder with n inputs can have how many outputs?',opts:['n','n²','2^n','2n'],ans:2},
    {q:'Which gate inverts the output of an AND gate?',opts:['NOR','NAND','XNOR','NOT'],ans:1},
    {q:'Binary 1111 = decimal?',opts:['14','15','16','13'],ans:1},
    {q:'A JK flip-flop with J=1, K=1 does what on clock edge?',opts:['Sets','Resets','Toggles','No change'],ans:2},
    {q:'Propagation delay in a logic gate refers to?',opts:['Power consumed','Time for output to respond to input change','Heat generated','Frequency'],ans:1},
    {q:'Which expression is always 1?',opts:['A AND 0','A OR 0',"A OR A'",'A AND A'],ans:2},
    {q:'Gray code differs from binary in that?',opts:['Uses more bits','Only one bit changes between consecutive values','Uses letters','Represents negative numbers'],ans:1},
  ],

  'Programming in C': [
    {q:'Which symbol is used for single-line comments in C?',opts:['#','//','/* */','--'],ans:1},
    {q:'What does printf() do in C?',opts:['Takes input','Prints output','Declares variable','Loops'],ans:1},
    {q:'Which data type stores a single character in C?',opts:['int','float','char','string'],ans:2},
    {q:'What is the correct syntax to declare an integer variable x?',opts:['integer x;','int x;','var x;','x int;'],ans:1},
    {q:'The for loop in C has how many parts?',opts:['1','2','3','4'],ans:2},
    {q:'Which operator is used to access value at a pointer address?',opts:['&','*','->','.'],ans:1},
    {q:'What does scanf() do?',opts:['Print output','Take user input','Declare function','Return value'],ans:1},
    {q:'An array index in C starts at?',opts:['1','0','-1','Depends on compiler'],ans:1},
    {q:'Which keyword exits a loop in C?',opts:['exit','stop','break','return'],ans:2},
    {q:'What is the size of int in most 32-bit systems?',opts:['1 byte','2 bytes','4 bytes','8 bytes'],ans:2},
    {q:'Which header file is needed for printf and scanf?',opts:['stdlib.h','string.h','stdio.h','math.h'],ans:2},
    {q:'What does the & operator do when used with a variable?',opts:['Multiplies','Gets memory address','Dereferences','Adds'],ans:1},
    {q:'A function that calls itself is called?',opts:['Iteration','Loop','Recursion','Pointer function'],ans:2},
    {q:'What is the return type of main() in C?',opts:['void','char','float','int'],ans:3},
    {q:'Which loop checks the condition at the end?',opts:['for','while','do-while','foreach'],ans:2},
    {q:'What does malloc() do?',opts:['Frees memory','Allocates dynamic memory','Copies memory','Prints memory address'],ans:1},
    {q:'Strings in C are terminated with?',opts:["'\\n'","'\\0'","'\\t'","'\\r'"],ans:1},
    {q:'Which operator compares two values for equality in C?',opts:['=','==','!=','==='],ans:1},
    {q:'What is the output of 5 % 2 in C?',opts:['2','2.5','1','0'],ans:2},
    {q:'A structure in C is defined using which keyword?',opts:['class','struct','type','record'],ans:1},
    {q:'What does the continue statement do in a loop?',opts:['Exits loop','Skips current iteration','Restarts loop','None'],ans:1},
    {q:'Pointers store?',opts:['Values','Memory addresses','Characters','Functions'],ans:1},
    {q:'Which function is used to find string length in C?',opts:['len()','length()','strlen()','strsize()'],ans:2},
    {q:'A void function?',opts:['Returns 0','Returns nothing','Returns -1','Returns char'],ans:1},
    {q:'Which of these is a valid C variable name?',opts:['2count','my-var','_total','float'],ans:2},
  ],

  'Basic Electrical Engineering': [
    {q:'Ohm\'s law states V = ?',opts:['I/R','IR','I+R','I-R'],ans:1},
    {q:'The unit of resistance is?',opts:['Volt','Ampere','Ohm','Watt'],ans:2},
    {q:'The unit of electric current is?',opts:['Volt','Ohm','Ampere','Joule'],ans:2},
    {q:'Power in a circuit is calculated as?',opts:['V/I','V+I','VI','V-I'],ans:2},
    {q:'In a series circuit, the total resistance is?',opts:['Sum of all resistances','Product of all resistances','Less than smallest','Average of all'],ans:0},
    {q:'Kirchhoff\'s Current Law states that at any node?',opts:['Sum of voltages = 0','Sum of currents = 0','Voltage is constant','Current is constant'],ans:1},
    {q:'The unit of capacitance is?',opts:['Henry','Ohm','Farad','Tesla'],ans:2},
    {q:'What does AC stand for?',opts:['Actual Current','Alternating Current','Absolute Current','Applied Current'],ans:1},
    {q:'A transformer is used to?',opts:['Convert AC to DC','Step up or step down AC voltage','Store charge','Measure current'],ans:1},
    {q:'The frequency of AC supply in Nepal is?',opts:['50 Hz','60 Hz','100 Hz','25 Hz'],ans:0},
    {q:'Which material is the best conductor of electricity?',opts:['Iron','Copper','Rubber','Glass'],ans:1},
    {q:'The unit of inductance is?',opts:['Farad','Tesla','Henry','Weber'],ans:2},
    {q:'In a parallel circuit, the voltage across each component is?',opts:['Different','Zero','The same','Divided equally'],ans:2},
    {q:'Fleming\'s right hand rule relates to?',opts:['Electric motors','Electric generators','Transformers','Capacitors'],ans:1},
    {q:'What is the SI unit of electric charge?',opts:['Ampere','Volt','Coulomb','Watt'],ans:2},
    {q:'The power factor of a purely resistive circuit is?',opts:['0','0.5','1','Infinity'],ans:2},
    {q:'Which device converts electrical energy to mechanical energy?',opts:['Generator','Transformer','Motor','Battery'],ans:2},

let Qs = QB[subject] || null;

if (!Qs) {
  document.getElementById('mainWrap').innerHTML = `
    <div class="no-qs">
      <h3>Questions not available yet</h3>
      <p>Questions for <strong>${subject || 'this subject'}</strong> are not in the system yet.<br/>
      Please go back and choose a subject, or ask your admin to add questions.</p>
      <a href="student-dashboard.html">← Go back to Dashboard</a>
    </div>`;
} else {
  init();
}

function init() {
  const TOTAL  = Qs.length;
  let cur      = 0;
  let answers  = new Array(TOTAL).fill(null);
  let skipped  = new Array(TOTAL).fill(false);
  let revealed = new Array(TOTAL).fill(false);
  let secLeft  = 25 * 60;
  let ticker   = null;

  const dotRow = document.getElementById('dotRow');
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'qdot' + (i===0?' cur':'');
    d.textContent = i+1;
    d.onclick = () => jump(i);
    dotRow.appendChild(d);
  }

  if (mode === 'timed') {
    ticker = setInterval(() => {
      secLeft--;
      const m = Math.floor(secLeft/60).toString().padStart(2,'0');
      const s = (secLeft%60).toString().padStart(2,'0');
      const tv = document.getElementById('timerVal');
      tv.textContent = `${m}:${s}`;
      if (secLeft <= 60)       tv.className = 'timer-val crit';
      else if (secLeft <= 300) tv.className = 'timer-val warn';
      if (secLeft <= 0) { clearInterval(ticker); submitQuiz(); }
    }, 1000);
  }

  function render() {
    const q = Qs[cur];
    document.getElementById('qNum').textContent     = `Question ${cur+1} of ${TOTAL}`;
    document.getElementById('qText').textContent    = q.q;
    document.getElementById('progText').textContent = `${cur+1} / ${TOTAL}`;
    document.getElementById('progBar').style.width  = `${((cur+1)/TOTAL)*100}%`;

    document.querySelectorAll('.qdot').forEach((d,i) => {
      d.className = 'qdot';
      if (i===cur)              d.classList.add('cur');
      else if (answers[i]!==null) d.classList.add('answered');
      else if (skipped[i])        d.classList.add('skipped');
    });

    const grid = document.getElementById('optsGrid');
    grid.innerHTML = '';
    ['A','B','C','D'].forEach((lbl,i) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.innerHTML = `<span class="opt-lbl">${lbl}</span>${q.opts[i]}`;
      btn.onclick = () => pick(i);
      btn.disabled = revealed[cur];
      if (revealed[cur]) {
        if (i === q.ans)             btn.classList.add('right');
        else if (i === answers[cur]) btn.classList.add('wrong');
      } else if (answers[cur] === i) {
        btn.classList.add('chosen');
      }
      grid.appendChild(btn);
    });

    const fb = document.getElementById('feedback');
    if (revealed[cur] && mode === 'practice') {
      const ok = answers[cur] === q.ans;
      fb.className  = `feedback ${ok?'right':'wrong'}`;
      fb.textContent = ok ? 'Correct.' : `Incorrect. The correct answer is: ${q.opts[q.ans]}`;
    } else {
      fb.className = 'feedback';
    }

    document.getElementById('btnPrev').disabled    = cur === 0;
    document.getElementById('btnNext').textContent = cur === TOTAL-1 ? 'Review' : 'Next →';
  }

  function pick(i) {
    if (revealed[cur]) return;
    answers[cur] = i;
    skipped[cur] = false;
    if (mode === 'practice') revealed[cur] = true;
    render();
  }

  window.nextQ  = () => { if (cur < TOTAL-1) { cur++; render(); } };
  window.prevQ  = () => { if (cur > 0)       { cur--; render(); } };
  window.skipQ  = () => { skipped[cur]=true; if (cur < TOTAL-1) { cur++; render(); } };
  window.jump   = (i) => { cur = i; render(); };

  window.openModal = () => {
    const ans  = answers.filter(a=>a!==null).length;
    const skip = skipped.filter(Boolean).length;
    document.getElementById('mAns').textContent  = ans;
    document.getElementById('mSkip').textContent = skip;
    document.getElementById('mLeft').textContent = Math.max(0, TOTAL - ans - skip);
    document.getElementById('overlay').classList.add('show');
  };
  window.closeModal = () => document.getElementById('overlay').classList.remove('show');

  window.submitQuiz = () => {
    clearInterval(ticker);
    let score = 0;
    answers.forEach((a,i) => { if (a === Qs[i].ans) score++; });
    localStorage.setItem('quizScore',   score);
    localStorage.setItem('quizTotal',   TOTAL);
    localStorage.setItem('quizAnswers', JSON.stringify(answers));
    localStorage.setItem('quizCorrect', JSON.stringify(Qs.map(q=>q.ans)));
    localStorage.setItem('quizQs',      JSON.stringify(Qs));
    window.location.href = 'results.html';
  };

  render();
}
</script>
